<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LIFE OS — Sistema de Transformación Personal</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- Mobile Toggle -->
<button class="mobile-toggle" onclick="toggleSidebar()">
  <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
</button>

<div class="app-layout">

  <!-- ═══ SIDEBAR ═══ -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="brand-icon">OS</div>
      <div class="brand-text">
        <h1>LIFE OS</h1>
        <span>90-Day Transformation</span>
      </div>
    </div>

    <nav>
      <div class="nav-section">
        <div class="nav-section-title">Principal</div>
        <div class="nav-item active" data-nav="dashboard" onclick="navigateTo('dashboard')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
          Centro de Comando
        </div>
        <div class="nav-item" data-nav="financial" onclick="navigateTo('financial')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
          Finanzas
          <span class="nav-badge">!</span>
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Crecimiento</div>
        <div class="nav-item" data-nav="goals" onclick="navigateTo('goals')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>
          Metas
        </div>
        <div class="nav-item" data-nav="habits" onclick="navigateTo('habits')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          Hábitos
        </div>
        <div class="nav-item" data-nav="deepwork" onclick="navigateTo('deepwork')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Deep Work
        </div>
      </div>

      <div class="nav-section">
        <div class="nav-section-title">Estrategia</div>
        <div class="nav-item" data-nav="plan" onclick="navigateTo('plan')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          Plan 90 Días
        </div>
        <div class="nav-item" data-nav="identity" onclick="navigateTo('identity')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Identidad
        </div>
      </div>
    </nav>

    <!-- XP Bar -->
    <div class="sidebar-xp" id="sidebar-xp"></div>
  </aside>

  <!-- ═══ MAIN CONTENT ═══ -->
  <main class="main-content">

    <!-- DASHBOARD -->
    <div class="section active" id="section-dashboard"></div>

    <!-- FINANCIAL -->
    <div class="section" id="section-financial"></div>

    <!-- GOALS -->
    <div class="section" id="section-goals"></div>

    <!-- HABITS -->
    <div class="section" id="section-habits"></div>

    <!-- DEEP WORK -->
    <div class="section" id="section-deepwork"></div>

    <!-- PLAN -->
    <div class="section" id="section-plan"></div>

    <!-- IDENTITY -->
    <div class="section" id="section-identity"></div>

  </main>

</div>

<!-- Scripts -->
<script src="js/store.js"></script>
<script src="js/utils.js"></script>
<script src="js/app.js"></script>

</body>
</html>
